---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: test-combined
spec:
  interval: 5m
  url: oci://sigstore-test-registry:5000/test/v2-key
  ref:
    tag: v1
  insecure: true
  verify:
    provider: cosign
    secretRef:
      name: cosign-test-key
    trustedRootSecretRef:
      name: sigstore-trusted-root
